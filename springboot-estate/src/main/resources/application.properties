spring.application.name=springboot-estate
server.port=3000
# Spring Boot 4.x uses spring.mongodb.* (NOT spring.data.mongodb.*)
# Set SPRING_MONGODB_URI in ECS (preferred) or MONGODB_URI as a fallback.
# No localhost default — fail fast if the URI is missing in production.
spring.mongodb.uri=${MONGODB_URI:}
jwt.secret=${JWT_SECRET}
# Token expiry in milliseconds (default: 7 days)
jwt.expiration=${JWT_EXPIRATION:604800000}
# Set to true in production (HTTPS only)
server.use-secure-cookie=${USE_SECURE_COOKIE:false}

# App base URL (used in password reset email link)
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Email (SMTP) configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
